services:
  - type: web
    name: sisgp
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sisgp-db
          property: connectionString
      - key: NODE_ENV
        value: production
      # Defina manualmente após o primeiro deploy com a URL final do Render,
      # ex: https://sisgp.onrender.com — restringe o CORS a essa origem.
      - key: ALLOWED_ORIGIN
        sync: false

databases:
  - name: sisgp-db
    plan: free
